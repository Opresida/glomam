<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#1a2332"/>

  <!-- Square (esquadro) - two lines forming an L shape -->
  <g stroke="#b4975a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical arm of square -->
    <line x1="18" y1="14" x2="18" y2="44"/>
    <!-- Horizontal arm of square -->
    <line x1="18" y1="44" x2="46" y2="44"/>
  </g>

  <!-- Compass (compasso) - two legs spread from top center -->
  <g stroke="#b4975a" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- Left leg of compass -->
    <line x1="32" y1="16" x2="20" y2="42"/>
    <!-- Right leg of compass -->
    <line x1="32" y1="16" x2="44" y2="42"/>
    <!-- Hinge/pivot arc at top -->
    <path d="M 26,24 A 8,8 0 0,1 38,24" stroke-width="2.5"/>
  </g>

  <!-- Letter G in the center -->
  <text x="32" y="38" font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#b4975a" text-anchor="middle" dominant-baseline="middle">G</text>
</svg>
